name: m2prnet_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.8

  # 基础库
  - numpy
  - pandas=2.0.3
  - scikit-learn=1.3.2
  - lmdb=1.8.1
  - rdkit=2024.3.5
  - pip

  # PyTorch + CUDA 11.8
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=11.8

  # pip 安装（GPU相关库基本都在 pip）
  - pip:
      - dgl==2.4.0+cu118 -f https://data.dgl.ai/wheels/repo.html
      - dm-tree==0.1.8
      - timm==1.0.25